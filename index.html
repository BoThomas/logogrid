<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Color Grid</title>
<style>
  :root {
    --box-size: 200px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #111;
  }

  #grid {
    display: grid;
    grid-auto-rows: var(--box-size);
    width: 100%;
  }

  .cell {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .logo {
    background-color: var(--fg);
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-position: center;
    -webkit-mask-size: contain;
    mask-size: contain;
  }

  #sentinel {
    width: 100%;
    height: 1px;
  }

  /* Floating bottom control strip */
  #panel {
    position: fixed;
    left: 50%;
    bottom: 12px;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: nowrap;
    gap: 10px 14px;
    width: max-content;
    max-width: calc(100vw - 20px);
    background: rgba(15, 15, 15, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: rgba(255, 255, 255, 0.85);
    padding: 8px 16px;
    border-radius: 18px;
    font-size: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    opacity: 0.6;
    transition: opacity 0.2s ease, background 0.2s ease;
    touch-action: manipulation;
  }

  #panel:hover,
  #panel:focus-within,
  #panel.active {
    opacity: 1;
    background: rgba(15, 15, 15, 0.85);
  }

  #panel .field {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 0 1 auto;
    min-width: 0;
  }

  #panel .field label {
    opacity: 0.7;
    flex-shrink: 0;
  }

  #panel .val {
    opacity: 0.5;
    font-variant-numeric: tabular-nums;
    width: 34px;
    flex-shrink: 0;
  }

  #uploadLabel, #refreshBtn {
    flex-shrink: 0;
  }

  input[type="range"] {
    width: 90px;
    min-width: 60px;
    flex: 1 1 60px;
    height: 24px;
    accent-color: #6ee7ff;
  }

  #uploadLabel, #refreshBtn {
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    transition: background 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  #uploadLabel:hover, #refreshBtn:hover,
  #uploadLabel:active, #refreshBtn:active {
    background: rgba(255,255,255,0.22);
  }

  #fileInput { display: none; }

  #divider {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    #panel {
      flex-wrap: wrap;
      width: auto;
    }
    input[type="range"] {
      width: 70px;
    }
    #divider { display: none; }
  }
</style>
</head>
<body>

<div id="grid"></div>
<div id="sentinel"></div>

<div id="panel">
  <label id="uploadLabel" for="fileInput">Upload SVG</label>
  <input type="file" id="fileInput" accept="image/svg+xml">

  <div id="divider"></div>

  <div class="field">
    <label for="sizeSlider">Size</label>
    <input type="range" id="sizeSlider" min="40" max="400" step="4">
    <span class="val" id="sizeVal"></span>
  </div>

  <div class="field">
    <label for="padSlider">Padding</label>
    <input type="range" id="padSlider" min="0" max="45" step="1">
    <span class="val" id="padVal"></span>
  </div>

  <div id="divider"></div>

  <span id="refreshBtn">Shuffle</span>
</div>

  let boxSize = parseInt(localStorage.getItem(SIZE_KEY), 10) || 200;
  let padPct = localStorage.getItem(PAD_KEY);
  padPct = padPct === null ? 15 : parseInt(padPct, 10);
  let logoDataUrl = localStorage.getItem(LOGO_KEY) || DEFAULT_LOGO;

  sizeSlider.value = boxSize;
  padSlider.value = padPct;
  sizeVal.textContent = boxSize + 'px';
  padVal.textContent = padPct + '%';

  let cols = 1;
  let loadedCount = 0;      // how many cells currently rendered
  let cellColors = [];      // color per cell index

  function randomHsl() {
    const h = Math.floor(Math.random() * 360);
    const s = 55 + Math.floor(Math.random() * 35);
    const l = 30 + Math.floor(Math.random() * 45);
    return `hsl(${h}, ${s}%, ${l}%)`;
  }

  function contrastingFg(bgHsl) {
    const match = bgHsl.match(/hsl\((\d+), (\d+)%, (\d+)%\)/);
    const bgL = match ? parseInt(match[3], 10) : 50;
    let fgL = bgL > 55 ? (5 + Math.random() * 25) : (70 + Math.random() * 25);
    const h = Math.floor(Math.random() * 360);
    const s = 55 + Math.floor(Math.random() * 35);
    return `hsl(${h}, ${s}%, ${Math.round(fgL)}%)`;
  }

  function getColorsForIndex(i) {
    if (!cellColors[i]) {
      const bg = randomHsl();
      const fg = contrastingFg(bg);
      cellColors[i] = { bg, fg };
    }
    return cellColors[i];
  }

  function applyCellStyle(cell, i) {
    const { bg, fg } = getColorsForIndex(i);
    cell.style.background = bg;
    const logoEl = cell.firstChild;
    logoEl.style.setProperty('--fg', fg);

    logoEl.style.width = `calc(100% - ${padPct * 2}%)`;
    logoEl.style.height = `calc(100% - ${padPct * 2}%)`;

    if (logoDataUrl) {
      logoEl.style.maskImage = `url("${logoDataUrl}")`;
      logoEl.style.webkitMaskImage = `url("${logoDataUrl}")`;
      logoEl.style.display = '';
    } else {
      logoEl.style.display = 'none';
    }
  }

  function makeCell(i) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const logo = document.createElement('div');
    logo.className = 'logo';
    cell.appendChild(logo);
    applyCellStyle(cell, i);
    return cell;
  }

  // Append `count` new cells to the grid (used for initial fill and lazy load)
  function appendCells(count) {
    const frag = document.createDocumentFragment();
    for (let i = loadedCount; i < loadedCount + count; i++) {
      frag.appendChild(makeCell(i));
    }
    grid.appendChild(frag);
    loadedCount += count;
  }

  // Recompute existing cells' styling in place (for size/padding/logo changes)
  function restyleAll() {
    const children = grid.children;
    for (let i = 0; i < children.length; i++) {
      applyCellStyle(children[i], i);
    }
  }

  function resetGrid() {
    cols = Math.max(1, Math.floor(window.innerWidth / boxSize));
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    document.documentElement.style.setProperty('--box-size', boxSize + 'px');

    grid.innerHTML = '';
    loadedCount = 0;
    cellColors = [];

    const viewportRows = Math.ceil(window.innerHeight / boxSize) + 1;
    const bufferRows = 2;
    appendCells(cols * (viewportRows + bufferRows));
  }

  function loadMoreRows() {
    const extraRows = 3;
    appendCells(cols * extraRows);
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        loadMoreRows();
      }
    });
  }, { rootMargin: '1000px 0px 1000px 0px' });

  observer.observe(sentinel);

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      logoDataUrl = reader.result;
      localStorage.setItem(LOGO_KEY, logoDataUrl);
      restyleAll();
    };
    reader.readAsDataURL(file);
  });

  sizeSlider.addEventListener('input', () => {
    boxSize = parseInt(sizeSlider.value, 10);
    sizeVal.textContent = boxSize + 'px';
    localStorage.setItem(SIZE_KEY, boxSize);
    resetGrid();
  });

  padSlider.addEventListener('input', () => {
    padPct = parseInt(padSlider.value, 10);
    padVal.textContent = padPct + '%';
    localStorage.setItem(PAD_KEY, padPct);
    restyleAll();
  });

  refreshBtn.addEventListener('click', () => {
    cellColors = [];
    restyleAll();
  });

  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resetGrid, 150);
  });

  // On touch devices there's no hover, so keep the panel fully visible
  // once it's been tapped, and only dim it again after tapping elsewhere.
  const panel = document.getElementById('panel');
  panel.addEventListener('touchstart', () => {
    panel.classList.add('active');
  }, { passive: true });

  document.addEventListener('touchstart', (e) => {
    if (!panel.contains(e.target)) {
      panel.classList.remove('active');
    }
  }, { passive: true });

  resetGrid();
})();
